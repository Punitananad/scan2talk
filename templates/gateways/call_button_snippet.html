<!-- 
  Call Masking Button Snippet
  Add this to templates/core/gateway_access.html or templates/gateways/qr_detail.html
-->

{% if call_masking_enabled %}
<div class="call-masking-section mt-4">
    <button 
        id="callOwnerBtn"
        onclick="generateMaskedCall('{{ qr_code }}')"
        class="w-full bg-green-600 text-white px-6 py-4 rounded-lg font-semibold text-lg hover:bg-green-700 transition-colors flex items-center justify-center"
    >
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
        </svg>
        📞 Call Owner
    </button>
    
    <p class="text-sm text-gray-500 mt-2 text-center">
        Your number will remain private
    </p>
    
    <!-- Loading state -->
    <div id="callLoading" class="hidden mt-4 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-green-600"></div>
        <p class="text-sm text-gray-600 mt-2">Generating secure call link...</p>
    </div>
    
    <!-- Error message -->
    <div id="callError" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-800"></p>
    </div>
</div>

<script>
async function generateMaskedCall(qrCode) {
    const btn = document.getElementById('callOwnerBtn');
    const loading = document.getElementById('callLoading');
    const error = document.getElementById('callError');
    
    // Hide error, show loading
    error.classList.add('hidden');
    loading.classList.remove('hidden');
    btn.disabled = true;
    btn.classList.add('opacity-50');
    
    try {
        const response = await fetch(`/gateways/call/${qrCode}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Redirect to call URL
            window.location.href = data.call_url;
            
            // Show success message (user will be redirected)
            setTimeout(() => {
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }, 1000);
        } else {
            throw new Error(data.error || 'Failed to generate call link');
        }
    } catch (err) {
        // Show error
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        error.querySelector('p').textContent = err.message;
        btn.disabled = false;
        btn.classList.remove('opacity-50');
    }
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endif %}
