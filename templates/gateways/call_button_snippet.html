<!-- 
  Call Masking Button Component
  Reusable call button for QR code pages
  
  Usage: Include this in any template where you want visitors to call the owner
  Required context variables:
  - qr_code: The QR code identifier
  - call_masking_enabled: Boolean to show/hide the button
-->

{% if call_masking_enabled %}
<div class="call-masking-section">
    <button 
        id="callOwnerBtn"
        onclick="generateMaskedCall('{{ qr_code }}')"
        class="w-full bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-6 py-4 rounded-xl font-bold text-lg transition-all shadow-lg flex items-center justify-center"
    >
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
        </svg>
        📞 Call Owner
    </button>
    
    <p class="text-sm text-gray-500 mt-2 text-center">
        🔒 Your number will remain private
    </p>
    
    <!-- Loading state -->
    <div id="callLoading" class="hidden mt-4 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-green-600"></div>
        <p class="text-sm text-gray-600 mt-2">Generating secure call link...</p>
    </div>
    
    <!-- Success message -->
    <div id="callSuccess" class="hidden mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
        <p class="text-sm text-green-800 font-medium">✅ Call link generated! Redirecting to dialer...</p>
    </div>
    
    <!-- Error message -->
    <div id="callError" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-800 font-medium"></p>
    </div>
</div>

<script>
async function generateMaskedCall(qrCode) {
    const btn = document.getElementById('callOwnerBtn');
    const loading = document.getElementById('callLoading');
    const success = document.getElementById('callSuccess');
    const error = document.getElementById('callError');
    
    // Hide messages, show loading
    error.classList.add('hidden');
    success.classList.add('hidden');
    loading.classList.remove('hidden');
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    
    try {
        const response = await fetch(`/gateways/call/${qrCode}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Show success message
            loading.classList.add('hidden');
            success.classList.remove('hidden');
            
            // Redirect to call URL after 1 second
            setTimeout(() => {
                window.location.href = data.call_url;
            }, 1000);
        } else if (data.payment_required) {
            // Payment required - redirect to payment page
            loading.classList.add('hidden');
            error.classList.remove('hidden');
            error.querySelector('p').textContent = '💳 Payment required. Redirecting...';
            
            // Redirect to payment page after 1 second
            setTimeout(() => {
                window.location.href = `/api/v1/auth/wallet/visitor-pay/${qrCode}/?action=call`;
            }, 1000);
        } else {
            throw new Error(data.error || 'Failed to generate call link');
        }
    } catch (err) {
        // Show error
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        error.querySelector('p').textContent = '❌ ' + err.message;
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endif %}
