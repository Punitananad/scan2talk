{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan 2 Talk – Professional Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+Devanagari:wght@600;800&display=swap');

@page {
  size: A4;
  margin: 0;
}

* {
  box-sizing: border-box;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  margin: 0;
  padding: 0;
  background: #f1f5f9;
  font-family: 'Inter', sans-serif;
}

/* ================= GRID LAYOUT ================= */
.page {
  width: 210mm;
  height: 297mm;
  padding: 10mm;
  margin: 0 auto;
  background: white;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 5mm;
  page-break-after: always;
}

/* ================= TAG CONTAINER ================= */
.tag {
  width: 95mm;
  height: 65mm;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-radius: 0; /* Square corners */
  border: 0.3mm solid #cbd5e1;
  box-shadow: 0 4mm 6mm -2mm rgba(0, 0, 0, 0.05);
}

/* ================= HEADER ================= */
.header-bar {
  height: 12mm;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5mm;
}

.logo-wrapper {
  height: 8mm;
  display: flex;
  align-items: center;
}

.brand-logo {
  height: 100%;
  width: auto;
  object-fit: contain;
}

.header-badge {
  color: #f8fafc;
  font-size: 2.2mm;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  opacity: 0.8;
}

/* ================= BODY ================= */
.main-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 38mm;
  padding: 4mm 5mm;
  gap: 3mm;
  align-items: center;
}

/* TEXT SECTION */
.text-zone {
  display: flex;
  flex-direction: column;
}

.title-en {
  font-size: 6mm; /* Increased Font Size for English */
  font-weight: 900;
  color: #0f172a;
  line-height: 1.05;
  letter-spacing: -0.3px;
  margin-bottom: 2mm;
}

.divider {
  width: 12mm;
  height: 1.2mm;
  background: #f59e0b; /* Amber divider */
  margin: 1mm 0 2mm 0;
}

.title-hi {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 4.2mm; /* Kept standard size to save space */
  font-weight: 700;
  color: #475569;
  line-height: 1.25;
}

/* QR SECTION */
.qr-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.qr-frame {
  width: 36mm;
  height: 36mm;
  padding: 1mm;
  border: 0.8mm solid #0f172a;
  border-radius: 0;
  background: white;
}

.qr-code-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.scan-label {
  margin-top: 1.5mm;
  font-size: 2mm;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ================= FOOTER ================= */
.footer-lean {
  height: 9mm;
  background: #f8fafc;
  border-top: 0.3mm solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5mm;
}

.footer-left {
  display: flex;
  align-items: center;
  gap: 2mm;
}

.shield-icon {
  font-size: 3.5mm;
  color: #0f172a;
}

.footer-label {
  font-size: 2.2mm;
  font-weight: 800;
  color: #0f172a;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* Colorful Icon Styles */
.footer-right {
  display: flex;
  align-items: center;
  gap: 3mm;
}

.icon-badge {
  display: flex;
  align-items: center;
  gap: 1mm;
  background: white;
  padding: 0.5mm 1.5mm;
  border-radius: 1mm;
  border: 0.2mm solid #e2e8f0;
}

.ib-icon {
  font-size: 2.8mm;
  line-height: 1;
}

.ib-text {
  font-size: 1.8mm;
  font-weight: 700;
  text-transform: uppercase;
  color: #334155;
}

/* Specific colors for icons */
.warn { color: #f59e0b; }
.park { color: #2563eb; }
.call { color: #16a34a; }

/* Print Specifics */
@media print {
  body { background: none; }
  .page { margin: 0; border: none; }
  .tag { break-inside: avoid; border: 0.2mm solid #ccc; box-shadow: none; }
}
</style>
</head>

<body>

{% for page_qrs in qr_pages %}
<div class="page">
  {% for qr in page_qrs %}
  <div class="tag">
    <!-- HEADER -->
    <div class="header-bar">
      <div class="logo-wrapper">
        <img src="{% static 'tag/bnw.jpg' %}" class="brand-logo" alt="Scan2Talk">
      </div>
      <div class="header-badge">Vehicle Safety Tag</div>
    </div>

    <!-- MAIN BODY -->
    <div class="main-content">
      <div class="text-zone">
        <div class="title-en">Scan to Contact <br>Vehicle Owner</div>
        <div class="divider"></div>
        <div class="title-hi">वाहन मालिक से संपर्क <br>करने के लिए स्कैन करें</div>
      </div>

      <div class="qr-container">
        <div class="qr-frame">
          <img src="data:image/png;base64,{{ qr.qr_code_data }}" class="qr-code-img" alt="QR Code">
        </div>
        <div class="scan-label">Scan Me</div>
      </div>
    </div>

    <!-- FOOTER WITH COLOURFUL ICONS -->
    <div class="footer-lean">
      <div class="footer-left">
        <span class="shield-icon">🛡️</span>
        <span class="footer-label">Privacy Protected</span>
      </div>
      
      <div class="footer-right">
        <div class="icon-badge">
          <span class="ib-icon warn">⚠️</span>
          <span class="ib-text">Emergency</span>
        </div>
        <div class="icon-badge">
          <span class="ib-icon park">🅿️</span>
          <span class="ib-text">Parking</span>
        </div>
        <div class="icon-badge">
          <span class="ib-icon call">📞</span>
          <span class="ib-text">Contact</span>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endfor %}

</body>
</html>
